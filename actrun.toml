# actrun configuration file
# Generated by: actrun init

# Workspace mode: local, worktree, tmp, docker
# workspace_mode = "local"

# Skip setup actions — use local toolchain instead
# Detected: node, python3, go
local_skip_actions = ["actions/checkout", "actions/setup-node", "actions/setup-python", "actions/setup-go"]

# Trust all third-party actions without prompt
# trust_actions = true

# Include uncommitted changes in worktree/tmp workspace
# include_dirty = true

# Default local GitHub context (optional)
# [local_context]
# repository = "owner/repo"
# ref_name = "main"
# before_rev = "HEAD^"
# after_rev = "HEAD"
# actor = "your-name"

# Nix: flake.nix detected, auto-detection enabled by default
# nix_mode = ""

# Additional nix packages
# nix_packages = ["python312", "jq"]

# Container runtime: docker, podman, container, lima, nerdctl
# container_runtime = "docker"

# Additional workflow file patterns for `actrun list`
# includes = [".github/workflows/*.yml", "ci/**/*.yaml"]

# Affected file patterns per workflow (optional)
# If not set, on:push:paths from workflow is used as fallback
# [affected."ci.yml"]
# patterns = ["src/**", "package.json"]

# Override actions with local scripts (optional)
# [override."actions/setup-node"]
# run = "echo 'using local node'"

# Lint rule configuration (optional)
# [lint]
# preset = "default"  # default, strict, oss
# ignore_rules = ["unknown-property", "unused-outputs"]
