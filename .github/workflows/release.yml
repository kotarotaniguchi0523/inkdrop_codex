name: Release

run-name: Prepare release from ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.13.0
  PNPM_VERSION: 10.14.0

jobs:
  preflight:
    name: Validate release request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Require an owner-initiated main build
        timeout-minutes: 1
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_ACTOR" = "$REPOSITORY_OWNER"
          test "$TRIGGERING_ACTOR" = "$REPOSITORY_OWNER"
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Resolve release metadata
        id: metadata
        timeout-minutes: 1
        run: |
          workspace_version=$(node -p "require('./package.json').version")
          plugin_version=$(node -p "require('./packages/plugin/package.json').version")
          test "$workspace_version" = "$plugin_version"
          printf '%s\n' "$plugin_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'
          echo "version=$plugin_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$plugin_version" >> "$GITHUB_OUTPUT"

  quality:
    name: Release quality gate
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - parallel:
          - name: Run Biome checks
            timeout-minutes: 5
            run: pnpm biome:check
          - name: Run TypeScript checks
            timeout-minutes: 5
            run: pnpm check
      - parallel:
          - name: Run tests
            timeout-minutes: 10
            run: pnpm test
          - name: Run Perry compatibility checks
            timeout-minutes: 10
            run: pnpm perry:check
          - name: Build plugin
            timeout-minutes: 5
            run: pnpm --filter inkdrop-codex build

  helper:
    name: Release helper (${{ matrix.platform }}-${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PERRY_WORKSPACE_ROOT: ${{ github.workspace }}/.perry-source
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node_arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            node_arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
            node_arch: x64
          - os: macos-15-intel
            platform: darwin
            arch: x64
            node_arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            node_arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Check out pinned Perry sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 3
        with:
          repository: PerryTS/perry
          ref: 06137858dc8c6f80975238377138f2f948d6ef88 # v0.5.1220
          path: .perry-source
          persist-credentials: false
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
          architecture: ${{ matrix.node_arch }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Build native credential helper
        timeout-minutes: 30
        run: pnpm build:helper
      - name: Upload credential helper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        timeout-minutes: 3
        with:
          name: credential-helper-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/credential-helper/dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  windows-arm-compatibility:
    name: Release helper (win32-arm64 compatibility)
    needs: helper
    runs-on: windows-11-arm
    timeout-minutes: 10
    steps:
      - name: Download Windows x64 helper
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 3
        with:
          name: credential-helper-win32-x64
          path: ${{ runner.temp }}/credential-helper
      - name: Verify and stage x64 helper on Windows ARM64
        timeout-minutes: 2
        shell: pwsh
        run: |
          $source = "${{ runner.temp }}/credential-helper/win32-x64/credential-helper.exe"
          if (-not (Test-Path $source)) {
            throw "The Windows x64 helper artifact is missing"
          }
          $response = '{}' | & $source
          if ($response -notmatch '"kind":"Failure"') {
            throw "The x64 compatibility helper did not execute on Windows ARM64"
          }
          New-Item -ItemType Directory -Force `
            packages/credential-helper/dist/win32-arm64 | Out-Null
          Copy-Item $source packages/credential-helper/dist/win32-arm64/credential-helper.exe
          $global:LASTEXITCODE = 0
      - name: Upload Windows ARM64 compatibility helper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        timeout-minutes: 3
        with:
          name: credential-helper-win32-arm64
          path: packages/credential-helper/dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  bundle:
    name: Assemble release bundle
    needs: [preflight, quality, helper, windows-arm-compatibility]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Download helpers from this workflow run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 3
        with:
          pattern: credential-helper-*
          path: ${{ runner.temp }}/credential-helpers
          merge-multiple: true
      - name: Stage validated native helpers
        timeout-minutes: 2
        env:
          HELPER_SOURCE: ${{ runner.temp }}/credential-helpers
        run: |
          test -f "$HELPER_SOURCE/linux-x64/credential-helper"
          test -f "$HELPER_SOURCE/linux-arm64/credential-helper"
          test -f "$HELPER_SOURCE/win32-x64/credential-helper.exe"
          test -f "$HELPER_SOURCE/win32-arm64/credential-helper.exe"
          test -f "$HELPER_SOURCE/darwin-x64/credential-helper"
          test -f "$HELPER_SOURCE/darwin-arm64/credential-helper"
          test "$(find "$HELPER_SOURCE" -type f \( -name credential-helper -o -name credential-helper.exe \) | wc -l)" -eq 6
          mkdir -p packages/plugin/bin
          cp -R "$HELPER_SOURCE"/. packages/plugin/bin/
      - name: Restore Unix executable permissions
        timeout-minutes: 2
        run: find packages/plugin/bin -type f -name credential-helper -exec chmod 755 {} +
      - name: Build plugin bundle
        timeout-minutes: 5
        run: pnpm --filter inkdrop-codex build
      - name: Prepare standalone Inkdrop package
        timeout-minutes: 3
        run: pnpm package:release
      - name: Create and inspect release archives
        timeout-minutes: 3
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          tar -C artifacts -czf "artifacts/inkdrop-codex-${VERSION}.tar.gz" inkdrop-codex
          cd artifacts
          zip -Xrq "inkdrop-codex-${VERSION}.zip" inkdrop-codex
          sha256sum "inkdrop-codex-${VERSION}.tar.gz" "inkdrop-codex-${VERSION}.zip" > checksums.txt
          mkdir "$RUNNER_TEMP/release-inspection"
          unzip -q "inkdrop-codex-${VERSION}.zip" -d "$RUNNER_TEMP/release-inspection"
          test "$(node -p "require('$RUNNER_TEMP/release-inspection/inkdrop-codex/package.json').version")" = "$VERSION"
          test -f "$RUNNER_TEMP/release-inspection/inkdrop-codex/bin/linux-x64/credential-helper"
          test -f "$RUNNER_TEMP/release-inspection/inkdrop-codex/bin/linux-arm64/credential-helper"
          test -f "$RUNNER_TEMP/release-inspection/inkdrop-codex/bin/win32-x64/credential-helper.exe"
          test -f "$RUNNER_TEMP/release-inspection/inkdrop-codex/bin/win32-arm64/credential-helper.exe"
          test -f "$RUNNER_TEMP/release-inspection/inkdrop-codex/bin/darwin-x64/credential-helper"
          test -f "$RUNNER_TEMP/release-inspection/inkdrop-codex/bin/darwin-arm64/credential-helper"
      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        timeout-minutes: 3
        with:
          name: inkdrop-codex-release-bundle
          path: |
            artifacts/inkdrop-codex-*.tar.gz
            artifacts/inkdrop-codex-*.zip
            artifacts/checksums.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish approved release
    needs: [preflight, bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: inkdrop-production
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download the approved bundle from this workflow run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 3
        with:
          name: inkdrop-codex-release-bundle
          path: release
      - name: Verify release state and checksums
        timeout-minutes: 2
        working-directory: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          current_main=$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq .sha)
          test "$current_main" = "$GITHUB_SHA"
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" --silent 2>/dev/null; then
            echo "Refusing to replace existing tag $RELEASE_TAG" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Refusing to replace existing release $RELEASE_TAG" >&2
            exit 1
          fi
          sha256sum --check checksums.txt
      - name: Attest release provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        timeout-minutes: 3
        with:
          subject-path: release/inkdrop-codex-*.*
      - name: Publish release without rebuilding
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: >-
          gh release create "$RELEASE_TAG"
          release/inkdrop-codex-*.tar.gz
          release/inkdrop-codex-*.zip
          release/checksums.txt
          --repo "$GITHUB_REPOSITORY"
          --target "$GITHUB_SHA"
          --generate-notes
          --title "$RELEASE_TAG"
