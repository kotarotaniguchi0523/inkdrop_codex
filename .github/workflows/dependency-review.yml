name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
          fetch-depth: 2
      - name: Classify changed files
        id: changes
        timeout-minutes: 1
        run: node scripts/classify-ci-changes.mjs >> "$GITHUB_OUTPUT"
      - name: Dependency review not required
        if: steps.changes.outputs.dependencies != 'true'
        timeout-minutes: 1
        run: echo "No dependency manifests or lockfiles changed."
      - name: Reject vulnerable dependency changes
        if: steps.changes.outputs.dependencies == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        timeout-minutes: 5
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime, development, unknown
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
