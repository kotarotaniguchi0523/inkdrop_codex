name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.13.0
  PNPM_VERSION: 10.14.0

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run repository quality gate
        run: pnpm quality

  helper:
    name: Helper (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build native credential helper
        run: pnpm build:helper
      - name: Upload credential helper
        uses: actions/upload-artifact@v7
        with:
          name: credential-helper-${{ runner.os }}-${{ runner.arch }}
          path: packages/credential-helper/dist/
          if-no-files-found: error
          retention-days: 14

  candidate:
    name: Assemble manual test bundle
    if: github.event_name == 'workflow_dispatch'
    needs: [quality, helper]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download all native helpers
        uses: actions/download-artifact@v5
        with:
          pattern: credential-helper-*
          path: packages/plugin/bin
          merge-multiple: true
      - name: Restore Unix executable permissions
        run: find packages/plugin/bin -type f -name credential-helper -exec chmod 755 {} +
      - name: Build plugin bundle
        run: pnpm --filter inkdrop-codex build
      - name: Prepare standalone Inkdrop package
        run: pnpm package:candidate
      - name: Create archives and checksums
        run: |
          version=$(node -p "require('./packages/plugin/package.json').version")
          tar -C artifacts -czf "artifacts/inkdrop-codex-${version}.tar.gz" inkdrop-codex
          cd artifacts
          zip -rq "inkdrop-codex-${version}.zip" inkdrop-codex
          sha256sum "inkdrop-codex-${version}.tar.gz" "inkdrop-codex-${version}.zip" > checksums.txt
      - name: Upload test bundle
        uses: actions/upload-artifact@v7
        with:
          name: inkdrop-codex-test-bundle
          path: |
            artifacts/inkdrop-codex-*.tar.gz
            artifacts/inkdrop-codex-*.zip
            artifacts/checksums.txt
          if-no-files-found: error
          retention-days: 14
