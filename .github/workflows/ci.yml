name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.13.0
  PNPM_VERSION: 10.14.0

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      helper: ${{ steps.filter.outputs.helper }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
          fetch-depth: 2
      - name: Detect native helper changes
        id: filter
        timeout-minutes: 1
        run: |
          if git diff --quiet HEAD^1 HEAD -- \
            .github/workflows/ \
            flake.lock \
            flake.nix \
            package.json \
            packages/credential-contract/ \
            packages/credential-helper/ \
            pnpm-lock.yaml \
            pnpm-workspace.yaml; then
            echo "helper=false" >> "$GITHUB_OUTPUT"
          else
            echo "helper=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - parallel:
          - name: Run Biome checks
            timeout-minutes: 5
            run: pnpm biome:check
          - name: Run TypeScript checks
            timeout-minutes: 5
            run: pnpm check
      - name: Run test, compatibility, and build checks
        timeout-minutes: 10
        run: >-
          pnpm test &&
          pnpm perry:check &&
          pnpm --filter inkdrop-codex build
  helper:
    name: Helper (${{ matrix.os }})
    needs: changes
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PERRY_WORKSPACE_ROOT: ${{ github.workspace }}/.perry-source
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Native helper build not required
        if: needs.changes.outputs.helper != 'true'
        timeout-minutes: 1
        run: echo "No native helper inputs changed."
      - name: Check out repository
        if: needs.changes.outputs.helper == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      # Perry 0.5.1220's bundled full stdlib has unresolved optional HTTP symbols.
      # The matching source lets Perry rebuild only the helper's reachable features.
      - name: Check out pinned Perry sources
        if: needs.changes.outputs.helper == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 3
        with:
          repository: PerryTS/perry
          ref: 06137858dc8c6f80975238377138f2f948d6ef88 # v0.5.1220
          path: .perry-source
          persist-credentials: false
          fetch-depth: 1
      - name: Restore Perry target cache
        if: needs.changes.outputs.helper == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        timeout-minutes: 5
        with:
          path: .perry-source/target
          key: perry-target-${{ runner.os }}-${{ runner.arch }}-06137858-${{ github.sha }}
          restore-keys: |
            perry-target-${{ runner.os }}-${{ runner.arch }}-06137858-
      - name: Install pnpm
        if: needs.changes.outputs.helper == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        if: needs.changes.outputs.helper == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Linux native dependencies
        if: needs.changes.outputs.helper == 'true' && runner.os == 'Linux'
        timeout-minutes: 5
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        if: needs.changes.outputs.helper == 'true'
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Build native credential helper
        if: needs.changes.outputs.helper == 'true'
        timeout-minutes: 30
        run: pnpm build:helper
