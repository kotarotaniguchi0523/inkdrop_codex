name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.13.0
  PNPM_VERSION: 10.14.0

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Go for workflow linting
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        timeout-minutes: 2
        with:
          go-version: "1.26.0"
          cache: false
      - name: Install sisakulint
        timeout-minutes: 3
        run: go install github.com/sisaku-security/sisakulint/cmd/sisakulint@v0.2.4
      - name: Install native dependencies
        timeout-minutes: 5
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Run repository quality gate
        timeout-minutes: 10
        run: pnpm quality

  helper:
    name: Helper (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PERRY_WORKSPACE_ROOT: ${{ github.workspace }}/.perry-source
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        timeout-minutes: 2
        with:
          persist-credentials: false
      # Perry 0.5.1220's bundled full stdlib has unresolved optional HTTP symbols.
      # The matching source lets Perry rebuild only the helper's reachable features.
      - name: Check out pinned Perry sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        timeout-minutes: 3
        with:
          repository: PerryTS/perry
          ref: v0.5.1220
          path: .perry-source
          persist-credentials: false
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Build native credential helper
        timeout-minutes: 30
        run: pnpm build:helper
      - name: Upload credential helper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        timeout-minutes: 3
        with:
          name: credential-helper-${{ runner.os }}-${{ runner.arch }}
          path: packages/credential-helper/dist/
          if-no-files-found: error
          retention-days: 14

  candidate:
    name: Assemble manual test bundle
    if: github.event_name == 'workflow_dispatch'
    needs: [quality, helper]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Download all native helpers
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        timeout-minutes: 3
        with:
          pattern: credential-helper-*
          path: ${{ runner.temp }}/credential-helpers
          merge-multiple: true
      - name: Stage validated native helpers
        timeout-minutes: 2
        env:
          HELPER_SOURCE: ${{ runner.temp }}/credential-helpers
        run: |
          test "$(find "$HELPER_SOURCE" -type f \( -name credential-helper -o -name credential-helper.exe \) | wc -l)" -eq 3
          mkdir -p packages/plugin/bin
          cp -R "$HELPER_SOURCE"/. packages/plugin/bin/
      - name: Restore Unix executable permissions
        timeout-minutes: 2
        run: find packages/plugin/bin -type f -name credential-helper -exec chmod 755 {} +
      - name: Build plugin bundle
        timeout-minutes: 5
        run: pnpm --filter inkdrop-codex build
      - name: Prepare standalone Inkdrop package
        timeout-minutes: 3
        run: pnpm package:candidate
      - name: Create archives and checksums
        timeout-minutes: 3
        run: |
          version=$(node -p "require('./packages/plugin/package.json').version")
          tar -C artifacts -czf "artifacts/inkdrop-codex-${version}.tar.gz" inkdrop-codex
          cd artifacts
          zip -rq "inkdrop-codex-${version}.zip" inkdrop-codex
          sha256sum "inkdrop-codex-${version}.tar.gz" "inkdrop-codex-${version}.zip" > checksums.txt
      - name: Upload test bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        timeout-minutes: 3
        with:
          name: inkdrop-codex-test-bundle
          path: |
            artifacts/inkdrop-codex-*.tar.gz
            artifacts/inkdrop-codex-*.zip
            artifacts/checksums.txt
          if-no-files-found: error
          retention-days: 14
