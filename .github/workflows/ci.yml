name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.13.0
  PNPM_VERSION: 11.15.1

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      quality: ${{ steps.filter.outputs.quality }}
      helper: ${{ steps.filter.outputs.helper }}
      codeql: ${{ steps.filter.outputs.codeql }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
          fetch-depth: 2
      - name: Classify changed files
        id: filter
        timeout-minutes: 1
        run: node scripts/classify-ci-changes.mjs >> "$GITHUB_OUTPUT"

  quality:
    name: Quality gate
    needs: changes
    if: needs.changes.outputs.quality == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - parallel:
          - name: Run Biome checks
            timeout-minutes: 5
            run: pnpm biome:check
          - name: Run TypeScript checks
            timeout-minutes: 5
            run: pnpm check
      - parallel:
          - name: Run tests
            timeout-minutes: 10
            run: pnpm test
          - name: Run Perry compatibility checks
            timeout-minutes: 10
            run: pnpm perry:check
          - name: Build plugin
            timeout-minutes: 5
            run: pnpm --filter inkdrop-codex build
  helper:
    name: Helper (${{ matrix.platform }}-${{ matrix.arch }})
    needs: changes
    if: needs.changes.outputs.helper == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PERRY_WORKSPACE_ROOT: ${{ github.workspace }}/.perry-source
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node_arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            node_arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
            node_arch: x64
          - os: macos-15-intel
            platform: darwin
            arch: x64
            node_arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            node_arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
      # Perry 0.5.1220's bundled full stdlib has unresolved optional HTTP symbols.
      # The matching source lets Perry rebuild only the helper's reachable features.
      - name: Check out pinned Perry sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 3
        with:
          repository: PerryTS/perry
          ref: 06137858dc8c6f80975238377138f2f948d6ef88 # v0.5.1220
          path: .perry-source
          persist-credentials: false
          fetch-depth: 1
      - name: Restore Perry target cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        timeout-minutes: 5
        with:
          path: .perry-source/target
          key: perry-target-${{ matrix.platform }}-${{ matrix.arch }}-06137858-${{ github.sha }}
          restore-keys: |
            perry-target-${{ matrix.platform }}-${{ matrix.arch }}-06137858-
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        timeout-minutes: 2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 2
        with:
          node-version: ${{ env.NODE_VERSION }}
          architecture: ${{ matrix.node_arch }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: sudo apt-get update && sudo apt-get install --yes clang libsecret-1-dev pkg-config
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Build native credential helper
        timeout-minutes: 30
        run: pnpm build:helper
      - name: Upload Windows x64 helper for ARM compatibility test
        if: >-
          matrix.platform == 'win32' &&
          matrix.arch == 'x64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        timeout-minutes: 3
        with:
          name: ci-credential-helper-win32-x64
          path: packages/credential-helper/dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  windows-arm-compatibility:
    name: Helper (win32-arm64 compatibility)
    needs: [changes, helper]
    if: needs.changes.outputs.helper == 'true'
    runs-on: windows-11-arm
    timeout-minutes: 10
    steps:
      - name: Download Windows x64 helper
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 3
        with:
          name: ci-credential-helper-win32-x64
          path: ${{ runner.temp }}/credential-helper
      - name: Verify x64 helper on Windows ARM64
        timeout-minutes: 2
        shell: pwsh
        run: |
          $helper = "${{ runner.temp }}/credential-helper/win32-x64/credential-helper.exe"
          if (-not (Test-Path $helper)) {
            throw "The Windows x64 helper artifact is missing"
          }
          $response = '{}' | & $helper
          if ($response -notmatch '"kind":"Failure"') {
            throw "The x64 compatibility helper did not execute on Windows ARM64"
          }
          $global:LASTEXITCODE = 0

  required:
    name: Required CI
    if: always()
    needs: [changes, quality, helper, windows-arm-compatibility]
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      - name: Require every selected gate to pass
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          QUALITY_REQUIRED: ${{ needs.changes.outputs.quality }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          HELPER_REQUIRED: ${{ needs.changes.outputs.helper }}
          HELPER_RESULT: ${{ needs.helper.result }}
          WINDOWS_ARM_RESULT: ${{ needs.windows-arm-compatibility.result }}
        run: |
          test "$CHANGES_RESULT" = "success"

          if [ "$QUALITY_REQUIRED" = "true" ]; then
            test "$QUALITY_RESULT" = "success"
          else
            test "$QUALITY_RESULT" = "skipped"
          fi

          if [ "$HELPER_REQUIRED" = "true" ]; then
            test "$HELPER_RESULT" = "success"
            test "$WINDOWS_ARM_RESULT" = "success"
          else
            test "$HELPER_RESULT" = "skipped"
            test "$WINDOWS_ARM_RESULT" = "skipped"
          fi
