name: CodeQL

on:
  pull_request:
  schedule:
    - cron: "17 18 * * 1"

permissions:
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          persist-credentials: false
          fetch-depth: 2
      - name: Detect analyzable changes
        id: changes
        timeout-minutes: 1
        run: |
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "analyze=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet HEAD^1 HEAD -- \
            package.json \
            packages/ \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            tsconfig.json; then
            echo "analyze=false" >> "$GITHUB_OUTPUT"
          else
            echo "analyze=true" >> "$GITHUB_OUTPUT"
          fi
      - name: CodeQL analysis not required
        if: steps.changes.outputs.analyze != 'true'
        timeout-minutes: 1
        run: echo "No JavaScript or TypeScript inputs changed."
      - name: Initialize CodeQL
        if: steps.changes.outputs.analyze == 'true'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        timeout-minutes: 5
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: Analyze repository
        if: steps.changes.outputs.analyze == 'true'
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        timeout-minutes: 10
        with:
          category: /language:javascript-typescript
